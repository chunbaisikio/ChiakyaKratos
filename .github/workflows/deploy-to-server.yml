name: Build and Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Node.js env
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Hexo environment
      run: pnpm install --frozen-lockfile

    - name: Patch theme widget
      run: ./scripts/patch-theme-widget.sh

    - name: Hexo build site
      run: pnpm exec hexo generate --force
    
    - name: Verify build output
      run: |
        ls -l public/index.html
        wc -c public/index.html
        head -n 5 public/index.html

    - name: Create deployment archive
      run: zip -r site-static.zip public

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: site-static
        path: site-static.zip
        retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: site-static

    - name: Deploy to server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || '7777' }}
        source: "site-static.zip"
        target: "/tmp/blog-deploy/"

    - name: Extract and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT || '7777' }}
        script: |
          # 创建临时目录
          mkdir -p /tmp/blog-deploy
          
          # 解压文件
          cd /tmp/blog-deploy
          unzip -o site-static.zip
          
          # 解压后校验首页
          ls -l /tmp/blog-deploy/public/index.html || true
          wc -c /tmp/blog-deploy/public/index.html || true
          
          # 复制到网站目录（根据你的宝塔配置修改路径）
          cp -a public/. /www/wwwroot/Chiakya.cc/
          
          # 设置正确的权限（排除 .user.ini 文件）
          find /www/wwwroot/Chiakya.cc/ -type f -not -name ".user.ini" -exec chmod 644 {} \;
          find /www/wwwroot/Chiakya.cc/ -type d -exec chmod 755 {} \;

          # 校验首页是否写入
          ls -l /www/wwwroot/Chiakya.cc/index.html || true
          wc -c /www/wwwroot/Chiakya.cc/index.html || true
          
          # 清理临时文件
          rm -rf /tmp/blog-deploy
          
          echo "Deployment completed successfully!"
